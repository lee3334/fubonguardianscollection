<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富邦悍將簽名蒐集圖鑑</title>
<style>
:root{--bg:#eef4ff;--surface:#fff;--surface-2:#f7faff;--text:#17304d;--muted:#5d7490;--line:#d6e3f4;--primary:#004b9b;--checked:#1f9d55;--pink:#F7CAC9;--shadow:0 12px 30px rgba(18,44,84,.10);--radius:22px}
*{box-sizing:border-box} body{margin:0;font-family:Arial,'Noto Sans TC',sans-serif;background:linear-gradient(180deg,#f6faff 0%,#edf4ff 100%);color:var(--text);transition:background .25s ease,color .25s ease}
.wrap{max-width:1220px;margin:0 auto;padding:20px 16px 48px} .hero{background:linear-gradient(135deg,#003b7a 0%,#005bbb 52%,#0c77e8 100%);color:#fff;border-radius:28px;padding:24px 22px;box-shadow:var(--shadow)}
body.angels-mode .hero{background:linear-gradient(135deg,#f7cac9 0%,#f4bfc4 60%,#efb5c0 100%)}
body.angels-mode{background:linear-gradient(180deg,#fff7f8 0%,#fdeff2 38%,#fae3ea 100%);color:#6f4a5d} body.angels-mode .section-title{color:#7f4f67} body.angels-mode .card{background:#fffafb;border-color:#f0d5dd;box-shadow:0 10px 24px rgba(145,87,111,.10)} body.angels-mode .photo{background:linear-gradient(180deg,#fff4f7 0%,#fbe4ea 100%)} body.angels-mode .meta{color:#9c7282} body.angels-mode .state{background:#fff1f4;color:#9c7282} body.angels-mode .card.checked .state{background:#f6d7e0;color:#9d4f6a;font-weight:700} body.angels-mode .empty{background:#fff7f9;border-color:#efcfd9;color:#9c7282}
.hero-top{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap} .title-wrap{display:flex;align-items:center;gap:12px;min-width:0} .logo-badge{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-weight:700;font-size:20px;border:1px solid rgba(255,255,255,.2)}
h1{margin:0;font-size:clamp(28px,4vw,42px)} .stats{display:grid;grid-template-columns:repeat(3,minmax(90px,1fr));gap:10px;width:min(380px,100%)} .stat{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:12px 14px} .stat .label{font-size:12px;color:rgba(255,255,255,.82);margin-bottom:4px} .stat .value{font-size:24px;font-weight:700}
.toolbar{margin-top:18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center} .tab-group,.filter-group{display:flex;flex-wrap:wrap;gap:8px}
.tab-btn,.chip,.secondary-btn{border:none;border-radius:999px;padding:10px 14px;cursor:pointer;font-size:14px} .tab-btn{background:#dcecff;color:var(--primary);font-weight:700} .tab-btn.active{background:#fff;color:var(--primary)} body.angels-mode .tab-btn{background:#f8e2e2;color:#a85d77} body.angels-mode .tab-btn.active{background:#fff;color:#a85d77}
.chip,.secondary-btn{background:rgba(255,255,255,.15);color:#fff} .chip.active{background:#fff;color:var(--primary);font-weight:700} body.angels-mode .chip, body.angels-mode .secondary-btn{background:rgba(255,255,255,.28);color:#9a5874} body.angels-mode .chip.active{background:#fff;color:#a85d77}
.search{flex:1 1 220px;min-width:220px} .search input{width:100%;border:none;outline:none;border-radius:999px;padding:14px 16px;font-size:16px;color:var(--text)}
.section-title{margin:26px 4px 14px;font-size:20px} .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 10px 24px rgba(29,67,118,.07)} .photo-btn{width:100%;border:none;background:none;padding:0;cursor:pointer;position:relative}
.photo{aspect-ratio:3/4;background:#eaf2ff;overflow:hidden;position:relative} .photo img{width:100%;height:100%;object-fit:cover;display:block} .check-badge{position:absolute;top:10px;right:10px;z-index:2;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.95);color:#9ca9b8;border:1px solid rgba(0,0,0,.06);font-size:18px;box-shadow:0 8px 20px rgba(0,0,0,.08)} .card.checked .check-badge{background:var(--checked);color:#fff}
.card-body{padding:12px 12px 14px} .name{font-size:18px;font-weight:700;margin:0 0 6px} .meta{color:var(--muted);font-size:14px;display:flex;justify-content:space-between;gap:8px} .state{margin-top:10px;border-radius:999px;background:var(--surface-2);color:var(--muted);font-size:13px;padding:8px 10px;text-align:center} .card.checked .state{background:#dcebff;color:#1f5fae;font-weight:700}
.empty{display:none;background:var(--surface);border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted);margin-top:16px}
@media (max-width:720px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.hero{border-radius:0 0 26px 26px;margin:0 -16px}.wrap{padding-top:0}.stats{width:100%}.name{font-size:15px}.meta{font-size:12px}.state{font-size:12px;padding:6px 8px}.card-body{padding:10px 8px 12px}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
<div class="hero-top"><div class="title-wrap"><div class="logo-badge">G</div><h1>富邦悍將簽名蒐集圖鑑</h1></div><div class="stats"><div class="stat"><div class="label">已蒐集</div><div class="value" id="collectedCount">0</div></div><div class="stat"><div class="label">總人數</div><div class="value" id="totalCount">0</div></div><div class="stat"><div class="label">完成率</div><div class="value" id="progressRate">0%</div></div></div></div>
<div class="toolbar"><div class="tab-group"><button class="tab-btn active" data-tab="players">球員</button><button class="tab-btn" data-tab="angels">Fubon Angels</button></div><label class="search"><input id="searchInput" type="search" placeholder="搜尋姓名、背號、守位"></label><div class="filter-group" id="filterGroup"><button class="chip active" data-filter="all">全部</button><button class="chip" data-filter="pitchers">投手</button><button class="chip" data-filter="catchers">捕手</button><button class="chip" data-filter="infielders">內野手</button><button class="chip" data-filter="outfielders">外野手</button></div><button class="secondary-btn" id="resetBtn">清除全部勾選</button></div>
</header>
<div class="empty" id="emptyState">目前沒有符合搜尋或篩選條件的成員。</div>
<section><h2 class="section-title" id="sectionTitle">球員名單</h2><div class="grid" id="cardGrid"></div></section>
</div>
<script>
const datasets = { players: [{"name": "陳品宏", "number": "10", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=陳品宏"}, {"name": "江國豪", "number": "12", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=江國豪"}, {"name": "廖任磊", "number": "13", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=廖任磊"}, {"name": "李建勳", "number": "17", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=李建勳"}, {"name": "張奕", "number": "19", "position": "投手", "category": "pitchers", "image": "assets/19.jpeg"}, {"name": "賴鴻誠", "number": "32", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=賴鴻誠"}, {"name": "王偉軒", "number": "37", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=王偉軒"}, {"name": "李吳永勤", "number": "38", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=李吳永勤"}, {"name": "魔力藍", "number": "44", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=魔力藍"}, {"name": "曾峻岳", "number": "60", "position": "投手", "category": "pitchers", "image": "assets/60.jpeg"}, {"name": "李東洺", "number": "66", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=李東洺"}, {"name": "鈴木駿輔", "number": "69", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=鈴木駿輔"}, {"name": "林栚呈", "number": "94", "position": "投手", "category": "pitchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=林栚呈"}, {"name": "豊暐", "number": "43", "position": "捕手", "category": "catchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=豊暐"}, {"name": "張進德", "number": "47", "position": "捕手", "category": "catchers", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=張進德"}, {"name": "戴培峰", "number": "95", "position": "捕手", "category": "catchers", "image": "assets/95.jpeg"}, {"name": "林澤彬", "number": "2", "position": "二壘手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=林澤彬"}, {"name": "王勝偉", "number": "3", "position": "游擊手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=王勝偉"}, {"name": "王念好", "number": "5", "position": "三壘手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=王念好"}, {"name": "王苡丞", "number": "14", "position": "一壘手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=王苡丞"}, {"name": "李宗賢", "number": "22", "position": "游擊手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=李宗賢"}, {"name": "范國宸", "number": "46", "position": "一壘手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=范國宸"}, {"name": "池恩齊", "number": "97", "position": "游擊手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=池恩齊"}, {"name": "高國麟", "number": "98", "position": "一壘手", "category": "infielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=高國麟"}, {"name": "張育成", "number": "99", "position": "游擊手", "category": "infielders", "image": "assets/99.jpeg"}, {"name": "蔡佳諺", "number": "65", "position": "中外野手", "category": "outfielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=蔡佳諺"}, {"name": "周佳樂", "number": "77", "position": "中外野手", "category": "outfielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=周佳樂"}, {"name": "孔念恩", "number": "82", "position": "右外野手", "category": "outfielders", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=孔念恩"}], angels: [{"name": "陳愉", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=陳愉"}, {"name": "呱呱", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=呱呱"}, {"name": "小芊", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=小芊"}, {"name": "貝兒", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=貝兒"}, {"name": "Laynee", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=Laynee"}, {"name": "李珠珢", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=李珠珢"}, {"name": "李晧禎", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=李晧禎"}, {"name": "李雅英", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=李雅英"}, {"name": "南珉貞", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=南珉貞"}, {"name": "奶昔", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=奶昔"}, {"name": "丹丹", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=丹丹"}, {"name": "潔米", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=潔米"}, {"name": "Tiffany", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=Tiffany"}, {"name": "秀秀子", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=秀秀子"}, {"name": "安娜", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=安娜"}, {"name": "卡洛琳", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=卡洛琳"}, {"name": "慈妹", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=慈妹"}, {"name": "大頭", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=大頭"}, {"name": "Jessy", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=Jessy"}, {"name": "維心", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=維心"}, {"name": "栗子", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=栗子"}, {"name": "沁沁", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=沁沁"}, {"name": "檸檬", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=檸檬"}, {"name": "雅惟", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=雅惟"}, {"name": "潔潔", "position": "Fubon Angels", "category": "angels", "image": "https://dummyimage.com/420x560/e8f1ff/0b4ea2&text=潔潔"}] };
const storageKey = 'fubon-sign-collection-v3';
let checkedMap = JSON.parse(localStorage.getItem(storageKey) || '{}');
let activeTab = 'players'; let activeFilter = 'all'; let keyword = '';
const cardGrid = document.getElementById('cardGrid'); const emptyState = document.getElementById('emptyState'); const collectedCount = document.getElementById('collectedCount'); const totalCount = document.getElementById('totalCount'); const progressRate = document.getElementById('progressRate'); const searchInput = document.getElementById('searchInput'); const filterGroup = document.getElementById('filterGroup'); const filterButtons = [...document.querySelectorAll('.chip')]; const tabButtons = [...document.querySelectorAll('.tab-btn')]; const resetBtn = document.getElementById('resetBtn'); const sectionTitle = document.getElementById('sectionTitle');
function saveState(){localStorage.setItem(storageKey, JSON.stringify(checkedMap));}
function currentList(){return datasets[activeTab] || [];}
function getFilteredList(){return currentList().filter(item => { const inFilter = activeTab !== 'players' ? true : (activeFilter === 'all' || item.category === activeFilter); const text = `${item.name} ${item.number || ''} ${item.position || ''}`; const inSearch = !keyword || text.includes(keyword); return inFilter && inSearch; });}
function updateHeader(){const list = currentList(); const collected = list.filter(item => checkedMap[`${activeTab}:${item.name}`]).length; const total = list.length; const rate = total ? Math.round(collected/total*100) : 0; collectedCount.textContent = collected; totalCount.textContent = total; progressRate.textContent = `${rate}%`; sectionTitle.textContent = activeTab === 'players' ? '球員名單' : 'Fubon Angels 名單'; searchInput.placeholder = activeTab === 'players' ? '搜尋姓名、背號、守位' : '搜尋 Fubon Angels 成員'; filterGroup.style.display = activeTab === 'players' ? 'flex' : 'none'; document.body.classList.toggle('angels-mode', activeTab === 'angels');}
function render(){updateHeader(); const filtered = getFilteredList(); emptyState.style.display = filtered.length ? 'none' : 'block'; cardGrid.innerHTML = filtered.map(item => { const key = `${activeTab}:${item.name}`; const checked = !!checkedMap[key]; const left = activeTab === 'players' ? `#${item.number}` : 'Fubon Angels'; const right = activeTab === 'players' ? item.position : '成員'; return `<article class="card ${checked ? 'checked' : ''}"><button class="photo-btn" type="button" data-name="${item.name}"><div class="photo"><div class="check-badge">${checked ? '✓' : '○'}</div><img src="${item.image}" alt="${item.name}" loading="lazy" width="420" height="560" onerror="if(!this.dataset.try2){this.dataset.try2=1;const m={'張奕':'19','曾峻岳':'60','戴培峰':'95','張育成':'99'};const n=m[this.alt];if(n){this.src='https://www.fubonguardians.com/upload/players/'+n+'.png';return;}} this.onerror=null;this.src='https://dummyimage.com/420x560/e8f1ff/0b4ea2&text='+encodeURIComponent(this.alt)"></div></button><div class="card-body"><h3 class="name">${item.name}</h3><div class="meta"><span>${left}</span><span>${right}</span></div><div class="state">${checked ? '已有簽名' : '尚未蒐集'}</div></div></article>`; }).join('');}
cardGrid.addEventListener('click', (e) => { const btn = e.target.closest('.photo-btn'); if (!btn) return; const key = `${activeTab}:${btn.dataset.name}`; checkedMap[key] = !checkedMap[key]; saveState(); render(); });
searchInput.addEventListener('input', e => { keyword = e.target.value.trim(); render(); });
filterButtons.forEach(btn => btn.addEventListener('click', () => { activeFilter = btn.dataset.filter; filterButtons.forEach(b => b.classList.toggle('active', b===btn)); render(); }));
tabButtons.forEach(btn => btn.addEventListener('click', () => { activeTab = btn.dataset.tab; keyword = ''; searchInput.value = ''; tabButtons.forEach(b => b.classList.toggle('active', b===btn)); render(); }));
resetBtn.addEventListener('click', () => { if (!confirm('要清除目前這個分頁的全部勾選紀錄嗎？')) return; currentList().forEach(item => delete checkedMap[`${activeTab}:${item.name}`]); saveState(); render(); });
render();
</script>
</body></html>
