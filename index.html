<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>富邦悍將簽名蒐集圖鑑</title>
  <style>
    :root{
      --bg:#eef4ff;
      --surface:#ffffff;
      --surface-2:#f7faff;
      --text:#1f2a44;
      --muted:#6c7a96;
      --primary:#1f5eff;
      --primary-soft:#dfe9ff;
      --border:#d7e3ff;
      --pink:#F7CAC9;
      --pink-soft:#fff1f1;
      --pink-border:#efb7b5;
      --shadow:0 10px 30px rgba(31,94,255,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#f4f8ff 0%,#eef4ff 100%);
      color:var(--text);
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px 20px 40px;
    }
    .hero{
      background:linear-gradient(135deg,#2f6bff 0%,#5a8cff 100%);
      color:#fff;
      border-radius:28px;
      padding:28px 24px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }
    body.angels-mode .hero{
      background:linear-gradient(135deg,#F7CAC9 0%,#f3b6b4 100%);
      color:#6b3b3b;
    }
    .hero h1{
      margin:0;
      font-size:clamp(28px,4vw,42px);
      line-height:1.15;
      letter-spacing:.5px;
    }
    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }
    .stat{
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.25);
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      backdrop-filter:blur(4px);
    }
    body.angels-mode .stat{
      background:rgba(255,255,255,.45);
      border:1px solid rgba(255,255,255,.65);
      color:#6b3b3b;
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin:18px 0 22px;
    }
    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .tab-btn{
      border:none;
      border-radius:999px;
      padding:11px 16px;
      background:#fff;
      color:var(--muted);
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 14px rgba(31,42,68,.06);
      border:1px solid transparent;
    }
    .tab-btn.active{
      background:var(--primary);
      color:#fff;
    }
    body.angels-mode .tab-btn.active{
      background:#d98f8d;
      color:#fff;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .search{
      min-width:min(280px,100%);
      padding:11px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      outline:none;
      font-size:15px;
    }
    .reset-btn{
      border:none;
      border-radius:12px;
      padding:11px 14px;
      cursor:pointer;
      font-weight:700;
      background:#fff;
      color:#c23b3b;
      border:1px solid #ffd0d0;
    }
    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:22px 0 12px;
    }
    .section-title h2{
      margin:0;
      font-size:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:16px;
    }
    @media (max-width:1100px){
      .grid{grid-template-columns:repeat(3,minmax(0,1fr));}
    }
    @media (max-width:800px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    }
    @media (max-width:540px){
      .grid{grid-template-columns:1fr;}
      .wrap{padding:16px 14px 32px;}
      .hero{padding:22px 18px;border-radius:22px;}
    }
    .card{
      position:relative;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:0 8px 22px rgba(31,42,68,.06);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      cursor:pointer;
    }
    .card:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 28px rgba(31,42,68,.10);
    }
    body.angels-mode .card{
      background:#fffdfd;
      border-color:var(--pink-border);
    }
    .image-wrap{
      position:relative;
      aspect-ratio:3/4;
      overflow:hidden;
      background:linear-gradient(135deg,#dfe9ff 0%,#f6f9ff 100%);
    }
    body.angels-mode .image-wrap{
      background:linear-gradient(135deg,#ffe8e7 0%,#fff7f7 100%);
    }
    .image-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .badge{
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(255,255,255,.92);
      color:var(--primary);
      font-size:12px;
      font-weight:800;
      padding:6px 9px;
      border-radius:999px;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }
    body.angels-mode .badge{
      color:#c97f7d;
    }
    .checked-tag{
      position:absolute;
      top:10px;
      right:10px;
      background:#1f5eff;
      color:#fff;
      font-size:12px;
      font-weight:800;
      padding:6px 9px;
      border-radius:999px;
      box-shadow:0 4px 10px rgba(0,0,0,.12);
      display:none;
    }
    body.angels-mode .checked-tag{
      background:#d98f8d;
    }
    .card.checked .checked-tag{
      display:block;
    }
    .content{
      padding:14px 14px 16px;
    }
    .name{
      font-size:20px;
      font-weight:800;
      margin:0 0 6px;
      line-height:1.2;
    }
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      color:var(--muted);
      font-size:14px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:var(--surface-2);
      border:1px solid var(--border);
    }
    body.angels-mode .pill{
      background:var(--pink-soft);
      border-color:#f1d0cf;
      color:#8a5a59;
    }
    .empty{
      text-align:center;
      padding:48px 16px;
      color:var(--muted);
      background:#fff;
      border:1px dashed var(--border);
      border-radius:20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>富邦悍將簽名蒐集圖鑑</h1>
      <div class="stats" id="stats"></div>
    </header>

    <div class="toolbar">
      <div class="tabs">
        <button class="tab-btn active" data-tab="players">球員</button>
        <button class="tab-btn" data-tab="angels">Fubon Angels</button>
      </div>
      <div class="actions">
        <input id="searchInput" class="search" type="text" placeholder="搜尋姓名 / 背號 / 位置">
        <button id="resetBtn" class="reset-btn">清除本分頁勾選</button>
      </div>
    </div>

    <section>
      <div class="section-title">
        <h2 id="sectionHeading">球員名單</h2>
      </div>
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" style="display:none;">找不到符合條件的成員。</div>
    </section>
  </div>

  <script>
    const players = [
      { name:"張奕", number:"19", position:"投手", category:"pitchers", image:"assets/IMG_8942.jpeg" },
      { name:"曾峻岳", number:"60", position:"投手", category:"pitchers", image:"assets/IMG_8943.jpeg" },
      { name:"戴培峰", number:"95", position:"捕手", category:"catchers", image:"assets/IMG_8941.jpeg" },
      { name:"張育成", number:"99", position:"游擊手", category:"infielders", image:"assets/IMG_8944.jpeg" },

      { name:"魔力藍", number:"21", position:"投手", category:"pitchers", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E9%AD%94%E5%8A%9B%E8%97%8D" },
      { name:"富藍戈", number:"44", position:"投手", category:"pitchers", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E5%AF%8C%E8%97%8D%E6%88%88" },
      { name:"曾峻岳", number:"60", position:"投手", category:"pitchers", image:"assets/IMG_8943.jpeg" },
      { name:"李東洺", number:"45", position:"投手", category:"pitchers", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E6%9D%8E%E6%9D%B1%E6%B4%BA" },
      { name:"黃保羅", number:"56", position:"投手", category:"pitchers", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E9%BB%83%E4%BF%9D%E7%BE%85" },
      { name:"陳仕朋", number:"81", position:"投手", category:"pitchers", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E9%99%B3%E4%BB%95%E6%9C%8B" },
      { name:"張瑞麟", number:"12", position:"捕手", category:"catchers", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E5%BC%B5%E7%91%9E%E9%BA%9F" },
      { name:"豊暐", number:"63", position:"捕手", category:"catchers", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E8%B1%8A%E6%9A%90" },
      { name:"范國宸", number:"46", position:"一壘手", category:"infielders", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E8%8C%83%E5%9C%8B%E5%AE%B8" },
      { name:"王念好", number:"39", position:"內野手", category:"infielders", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E7%8E%8B%E5%BF%B5%E5%A5%BD" },
      { name:"李宗賢", number:"22", position:"內野手", category:"infielders", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E6%9D%8E%E5%AE%97%E8%B3%A2" },
      { name:"周佳樂", number:"98", position:"外野手", category:"outfielders", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E5%91%A8%E4%BD%B3%E6%A8%82" },
      { name:"申皓瑋", number:"29", position:"外野手", category:"outfielders", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E7%94%B3%E7%9A%93%E7%91%8B" },
      { name:"高捷", number:"55", position:"外野手", category:"outfielders", image:"https://via.placeholder.com/600x800/e8f0ff/5b6f99?text=%E9%AB%98%E6%8D%B7" }
    ];

    const angels = [
      { name:"李珠珢", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E6%9D%8E%E7%8F%A0%E7%8F%A2" },
      { name:"李晧禎", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E6%9D%8E%E6%99%A7%E7%A6%8E" },
      { name:"李雅英", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E6%9D%8E%E9%9B%85%E8%8B%B1" },
      { name:"南珉貞", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E5%8D%97%E7%8F%89%E8%B2%9E" },
      { name:"陳愉", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E9%99%B3%E6%84%89" },
      { name:"呱呱", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E5%91%B1%E5%91%B1" },
      { name:"小芊", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E5%B0%8F%E8%8A%8A" },
      { name:"貝兒", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=%E8%B2%9D%E5%85%92" },
      { name:"Laynee", number:"", position:"Fubon Angels", category:"angels", image:"https://via.placeholder.com/600x800/ffe9e8/bf7f7d?text=Laynee" }
    ];

    let activeTab = "players";
    let keyword = "";
    const storageKey = "fubon-sign-collection";
    let checkedMap = {};

    try {
      checkedMap = JSON.parse(localStorage.getItem(storageKey) || "{}");
    } catch(e) {
      checkedMap = {};
    }

    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("grid");
    const emptyEl = document.getElementById("empty");
    const sectionHeading = document.getElementById("sectionHeading");
    const searchInput = document.getElementById("searchInput");
    const resetBtn = document.getElementById("resetBtn");
    const tabButtons = [...document.querySelectorAll(".tab-btn")];

    function currentList(){
      return activeTab === "players" ? players : angels;
    }

    function saveState(){
      localStorage.setItem(storageKey, JSON.stringify(checkedMap));
    }

    function getItemKey(item){
      return `${activeTab}:${item.name}`;
    }

    function isChecked(item){
      return !!checkedMap[getItemKey(item)];
    }

    function toggleItem(item){
      const key = getItemKey(item);
      checkedMap[key] = !checkedMap[key];
      saveState();
      render();
    }

    function filteredList(){
      const list = currentList();
      const q = keyword.trim().toLowerCase();
      if(!q) return list;
      return list.filter(item =>
        item.name.toLowerCase().includes(q) ||
        (item.number || "").toLowerCase().includes(q) ||
        (item.position || "").toLowerCase().includes(q)
      );
    }

    function renderStats(){
      const list = currentList();
      const checkedCount = list.filter(isChecked).length;
      const total = list.length;
      const rate = total ? Math.round((checkedCount / total) * 100) : 0;

      statsEl.innerHTML = `
        <div class="stat">目前分頁：${activeTab === "players" ? "球員" : "Fubon Angels"}</div>
        <div class="stat">已蒐集：${checkedCount} / ${total}</div>
        <div class="stat">完成率：${rate}%</div>
      `;
    }

    function render(){
      document.body.classList.toggle("angels-mode", activeTab === "angels");
      sectionHeading.textContent = activeTab === "players" ? "球員名單" : "Fubon Angels 名單";

      tabButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === activeTab);
      });

      renderStats();

      const list = filteredList();
      emptyEl.style.display = list.length ? "none" : "block";
      gridEl.innerHTML = list.map(item => `
        <article class="card ${isChecked(item) ? "checked" : ""}" data-name="${item.name}">
          <div class="image-wrap">
            <span class="badge">${item.number ? "#" + item.number : item.position}</span>
            <span class="checked-tag">已有簽名</span>
            <img src="${item.image}" alt="${item.name}" loading="lazy">
          </div>
          <div class="content">
            <h3 class="name">${item.name}</h3>
            <div class="meta">
              ${item.number ? `<span class="pill">背號 ${item.number}</span>` : ""}
              <span class="pill">${item.position}</span>
            </div>
          </div>
        </article>
      `).join("");

      [...document.querySelectorAll(".card")].forEach((card, index) => {
        card.addEventListener("click", () => toggleItem(list[index]));
      });
    }

    searchInput.addEventListener("input", e => {
      keyword = e.target.value;
      render();
    });

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        keyword = "";
        searchInput.value = "";
        render();
      });
    });

    resetBtn.addEventListener("click", () => {
      if (!confirm("要清除目前這個分頁的全部勾選紀錄嗎？")) return;
      currentList().forEach(item => delete checkedMap[`${activeTab}:${item.name}`]);
      saveState();
      render();
    });

    render();
  </script>
</body>
</html>
