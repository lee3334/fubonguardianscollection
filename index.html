<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富邦悍將簽名蒐集圖鑑</title>
<style>
:root{--bg:#eef4ff;--surface:#fff;--surface-2:#f7faff;--text:#17304d;--muted:#5d7490;--line:#d6e3f4;--primary:#004b9b;--checked:#1f7bd6;--pink:#F7CAC9;--shadow:0 12px 30px rgba(18,44,84,.10);--radius:22px}
*{box-sizing:border-box} body{margin:0;font-family:Arial,'Noto Sans TC',sans-serif;background:linear-gradient(180deg,#f6faff 0%,#edf4ff 100%);color:var(--text);transition:background .25s ease,color .25s ease}
.wrap{max-width:1220px;margin:0 auto;padding:20px 16px 48px} .hero{background:linear-gradient(135deg,#003b7a 0%,#005bbb 52%,#0c77e8 100%);color:#fff;border-radius:28px;padding:24px 22px;box-shadow:var(--shadow)}
body.angels-mode .hero{background:linear-gradient(135deg,#f7cac9 0%,#f4bfc4 60%,#efb5c0 100%)}
body.angels-mode{background:linear-gradient(180deg,#fff7f8 0%,#fdeff2 38%,#fae3ea 100%);color:#6f4a5d} body.angels-mode .section-title{color:#7f4f67} body.angels-mode .card{background:#fffafb;border-color:#f0d5dd;box-shadow:0 10px 24px rgba(145,87,111,.10)} body.angels-mode .photo{background:linear-gradient(180deg,#fff4f7 0%,#fbe4ea 100%)} body.angels-mode .meta{color:#9c7282} body.angels-mode .state{background:#fff1f4;color:#9c7282} body.angels-mode .card.checked .check-badge{background:#f4a6bc;color:#fff} body.angels-mode .card.checked .state{background:#f6d7e0;color:#9d4f6a;font-weight:700} body.angels-mode .empty{background:#fff7f9;border-color:#efcfd9;color:#9c7282}
.hero-top{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap} .title-wrap{display:flex;align-items:center;gap:12px;min-width:0} .logo-badge{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-weight:700;font-size:20px;border:1px solid rgba(255,255,255,.2)}
h1{margin:0;font-size:clamp(28px,4vw,42px)} .stats{display:grid;grid-template-columns:repeat(3,minmax(90px,1fr));gap:10px;width:min(380px,100%)} .stat{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:12px 14px} .stat .label{font-size:12px;color:rgba(255,255,255,.82);margin-bottom:4px} .stat .value{font-size:24px;font-weight:700}
.toolbar{margin-top:18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center} .tab-group,.filter-group{display:flex;flex-wrap:wrap;gap:8px}
.tab-btn,.chip,.secondary-btn{border:none;border-radius:999px;padding:10px 14px;cursor:pointer;font-size:14px} .tab-btn{background:#dcecff;color:var(--primary);font-weight:700} .tab-btn.active{background:#fff;color:var(--primary)} body.angels-mode .tab-btn{background:#f8e2e2;color:#a85d77} body.angels-mode .tab-btn.active{background:#fff;color:#a85d77}
.chip,.secondary-btn{background:rgba(255,255,255,.15);color:#fff} .chip.active{background:#fff;color:var(--primary);font-weight:700} body.angels-mode .chip, body.angels-mode .secondary-btn{background:rgba(255,255,255,.28);color:#9a5874} body.angels-mode .chip.active{background:#fff;color:#a85d77}
.search{flex:1 1 220px;min-width:220px} .search input{width:100%;border:none;outline:none;border-radius:999px;padding:14px 16px;font-size:16px;color:var(--text)}
.section-title{margin:26px 4px 14px;font-size:20px} .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 10px 24px rgba(29,67,118,.07)} .photo-btn{width:100%;border:none;background:none;padding:0;cursor:pointer;position:relative}
.photo{aspect-ratio:3/4;background:#eaf2ff;overflow:hidden;position:relative} .photo img{width:100%;height:100%;object-fit:cover;display:block} .check-badge{position:absolute;top:8px;left:8px;z-index:2;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.95);color:#9ca9b8;border:1px solid rgba(0,0,0,.06);font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.10)} .card.checked .check-badge{background:var(--checked);color:#fff}
.card-body{padding:12px 12px 14px} .name{font-size:18px;font-weight:700;margin:0 0 6px} .meta{color:var(--muted);font-size:14px;display:flex;justify-content:space-between;gap:8px} .state{margin-top:10px;border-radius:999px;background:var(--surface-2);color:var(--muted);font-size:13px;padding:8px 10px;text-align:center} .card.checked .state{background:#dcebff;color:#1f5fae;font-weight:700}
.empty{display:none;background:var(--surface);border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted);margin-top:16px}
@media (max-width:720px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.hero{border-radius:0 0 26px 26px;margin:0 -16px}.wrap{padding-top:0}.stats{width:100%}.name{font-size:15px}.meta{font-size:12px}.state{font-size:12px;padding:6px 8px}.card-body{padding:10px 8px 12px}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
<div class="hero-top"><div class="title-wrap"><div class="logo-badge">G</div><h1>富邦悍將簽名蒐集圖鑑</h1></div><div class="stats"><div class="stat"><div class="label">已蒐集</div><div class="value" id="collectedCount">0</div></div><div class="stat"><div class="label">總人數</div><div class="value" id="totalCount">0</div></div><div class="stat"><div class="label">完成率</div><div class="value" id="progressRate">0%</div></div></div></div>
<div class="toolbar"><div class="tab-group"><button class="tab-btn active" data-tab="players">球員</button><button class="tab-btn" data-tab="angels">Fubon Angels</button><button class="tab-btn" data-tab="tf111">TF111</button></div><label class="search"><input id="searchInput" type="search" placeholder="搜尋姓名、背號、守位"></label><div class="filter-group" id="filterGroup"><button class="chip active" data-filter="all">全部</button><button class="chip" data-filter="pitchers">投手</button><button class="chip" data-filter="catchers">捕手</button><button class="chip" data-filter="infielders">內野手</button><button class="chip" data-filter="outfielders">外野手</button></div><button class="secondary-btn" id="resetBtn">清除全部勾選</button></div>
</header>
<div class="empty" id="emptyState">目前沒有符合搜尋或篩選條件的成員。</div>
<section><h2 class="section-title" id="sectionTitle">球員名單</h2><div class="grid" id="cardGrid"></div></section>
</div>
<script>
const storageKey = 'fubon-sign-collection-v3';
let checkedMap = JSON.parse(localStorage.getItem(storageKey) || '{}');
let activeTab = 'players'; let activeFilter = 'all'; let keyword = '';
const cardGrid = document.getElementById('cardGrid'); const emptyState = document.getElementById('emptyState'); const collectedCount = document.getElementById('collectedCount'); const totalCount = document.getElementById('totalCount'); const progressRate = document.getElementById('progressRate'); const searchInput = document.getElementById('searchInput'); const filterGroup = document.getElementById('filterGroup'); const filterButtons = [...document.querySelectorAll('.chip')]; const tabButtons = [...document.querySelectorAll('.tab-btn')]; const resetBtn = document.getElementById('resetBtn'); const sectionTitle = document.getElementById('sectionTitle');
function saveState(){localStorage.setItem(storageKey, JSON.stringify(checkedMap));}
function currentList(){return datasets[activeTab] || [];}
function getFilteredList(){return currentList().filter(item => { const inFilter = activeTab !== 'players' ? true : (activeFilter === 'all' || item.category === activeFilter); const text = `${item.name} ${item.number || ''} ${item.position || ''}`; const inSearch = !keyword || text.includes(keyword); return inFilter && inSearch; });}
function updateHeader(){const list = currentList(); const collected = list.filter(item => checkedMap[`${activeTab}:${item.name}`]).length; const total = list.length; const rate = total ? Math.round(collected/total*100) : 0; collectedCount.textContent = collected; totalCount.textContent = total; progressRate.textContent = `${rate}%`; sectionTitle.textContent = activeTab === 'players' ? '球員名單' : activeTab === 'angels' ? 'Fubon Angels 名單' : 'TF111 應援團長'; searchInput.placeholder = activeTab === 'players' ? '搜尋姓名、背號、守位' : activeTab === 'angels' ? '搜尋 Angels 成員' : '搜尋 TF111 成員'; filterGroup.style.display = activeTab === 'players' ? 'flex' : 'none'; document.body.classList.toggle('angels-mode', activeTab === 'angels');}
function render(){updateHeader(); const filtered = getFilteredList(); emptyState.style.display = filtered.length ? 'none' : 'block'; cardGrid.innerHTML = filtered.map(item => { const key = `${activeTab}:${item.name}`; const checked = !!checkedMap[key]; const left = activeTab === 'tf111' ? 'TF111' : (item.number ? `#${item.number}` : 'Fubon Angels'); const right = item.position || '成員'; return `<article class="card ${checked ? 'checked' : ''}"><button class="photo-btn" type="button" data-name="${item.name}"><div class="photo"><div class="check-badge">${checked ? '✓' : '○'}</div><img src="${item.image}" alt="${item.name}" loading="lazy" width="420" height="560" onerror="if(!this.dataset.try2){this.dataset.try2=1;const m={'張奕':'19','曾峻岳':'60','戴培峰':'95','張育成':'99'};const n=m[this.alt];if(n){this.src='https://www.fubonguardians.com/upload/players/'+n+'.png';return;}} this.onerror=null;this.src='https://dummyimage.com/420x560/e8f1ff/0b4ea2&text='+encodeURIComponent(this.alt)"></div></button><div class="card-body"><h3 class="name">${item.name}</h3><div class="meta"><span>${left}</span><span>${right}</span></div><div class="state">${checked ? '已有簽名' : '尚未蒐集'}</div></div></article>`; }).join('');}
cardGrid.addEventListener('click', (e) => { const btn = e.target.closest('.photo-btn'); if (!btn) return; const key = `${activeTab}:${btn.dataset.name}`; checkedMap[key] = !checkedMap[key]; saveState(); render(); });
searchInput.addEventListener('input', e => { keyword = e.target.value.trim(); render(); });
filterButtons.forEach(btn => btn.addEventListener('click', () => { activeFilter = btn.dataset.filter; filterButtons.forEach(b => b.classList.toggle('active', b===btn)); render(); }));
tabButtons.forEach(btn => btn.addEventListener('click', () => { activeTab = btn.dataset.tab; keyword = ''; searchInput.value = ''; tabButtons.forEach(b => b.classList.toggle('active', b===btn)); render(); }));
resetBtn.addEventListener('click', () => { if (!confirm('要清除目前這個分頁的全部勾選紀錄嗎？')) return; currentList().forEach(item => delete checkedMap[`${activeTab}:${item.name}`]); saveState(); render(); });
render();
</script>
<script src="data.js"></script>
</body></html>
